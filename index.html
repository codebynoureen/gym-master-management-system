<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymMaster - Admin Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

     <div class="welcome-section">
        <div class="welcome-content">
            <div class="welcome-logo">
                <i class="fas fa-dumbbell"></i>
            </div>
            <h1 class="welcome-title">Welcome to GymMaster Admin Portal</h1>
            <p class="welcome-subtitle">Manage your gym operations with ease and efficiency</p>
            
            <div class="welcome-features">
                <div class="feature-item">
                    <i class="fas fa-users"></i>
                    <span>Manage Members & Trainers</span>
                </div>
                <div class="feature-item">
                    <i class="fas fa-calendar-alt"></i>
                    <span>Schedule Classes & Sessions</span>
                </div>
                <div class="feature-item">
                    <i class="fas fa-credit-card"></i>
                    <span>Manage Payments & Revenue</span>
                </div>
                <div class="feature-item">
                    <i class="fas fa-cogs"></i>
                    <span>Manage Equipment & Facilities</span>
                </div>
            </div>
        </div>
    </div>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <i class="fas fa-dumbbell"></i>
                <h1>GymMaster Admin</h1>
            </div>
            <form id="login-form" class="login-form">
                <input type="text" id="username" placeholder="Username" required>
                <input type="password" id="password" placeholder="Password" required>
               <button type="submit">Login</button>
            </form>
            <p style="margin-top: 20px;">
                Don't have an account? <a href="register.html">Register here</a>
            </p>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
